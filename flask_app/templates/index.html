{% extends "base.html" %}

{% block content %}
<div class="container">
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    {% if feedback_submitted %}
    <div class="success">Thank you for your feedback!</div>
    {% endif %}

    <form method="POST" action="/" class="question-form">
        <label for="question">Ask a question about the Student Handbook:</label>
        <textarea
            id="question"
            name="question"
            rows="3"
            placeholder="e.g., Do I have to attend all my lectures?"
            required
        ></textarea>
        <button type="submit">Ask</button>
    </form>
</div>
{% endblock %}
